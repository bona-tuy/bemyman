<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For BIN BIN ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ff4b6e,#ff7eb3);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.container{
    z-index:10;
    padding:20px;
}

h1{
    font-size:3rem;
    margin-bottom:15px;
    animation: glow 2s infinite;
}

p{
    font-size:1.2rem;
    margin-bottom:20px;
}

button{
    padding:12px 25px;
    margin:8px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:1rem;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

.surprise{
    background:white;
    color:#ff4b6e;
}

.music{
    background:#ff1744;
    color:white;
}

#message{
    margin-top:20px;
    font-size:1.5rem;
    font-weight:bold;
}

@keyframes glow{
    0%,100%{
        text-shadow:0 0 10px white;
    }
    50%{
        text-shadow:0 0 25px white;
    }
}

/* Floating Hearts */
.heart{
    position:absolute;
    bottom:-50px;
    color:white;
    font-size:25px;
    animation: float 8s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(0);
        opacity:1;
    }
    100%{
        transform:translateY(-110vh);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>❤️ I Love You ❤️</h1>

    <p>
        I have nothing to say much here.<br>
        but I just want to let you know that you are very special to me.<br>
        I hope this little surprise can make you smile.<br>
    </p>

    <button class="surprise" onclick="showLove()">
        🎁 Surprise
    </button>

    
    <div id="message"></div>
</div>

<!-- Replace with your own mp3 -->

<script>
function showLove(){
    document.getElementById("message").innerHTML =
    "💖 Can you be mine bin? 💖";
}

function playMusic(){
    document.getElementById("loveSong").play();
}

// Floating Hearts
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (20 + Math.random()*30) + "px";
    heart.style.animationDuration = (5 + Math.random()*5) + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },10000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
